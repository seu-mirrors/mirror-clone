on:
  push:
    branches:
    - release
    tags:
    - "v*"

name: Release

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    container: debian:buster
    steps:
      - uses: actions/checkout@v5
        name: Checkout 🛎️
        with:
          persist-credentials: false
      - name: Install musl toolchain
        run: |
          export DEBIAN_FRONTEND=noninteractive 
          sed -i 's#http://deb.debian.org#http://archive.debian.org#g' /etc/apt/sources.list
          apt-get update
          apt-get install -y libssl-dev curl build-essential pkg-config
      - uses: dtolnay/rust-toolchain@stable
        name: Setup Cargo Toolchain 🛎️
      - name: Compile all targets 🚀
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: create tar
        run: tar -cvzf mirror-clone.tar.gz -C target/x86_64-unknown-linux-gnu/release mirror-clone
      - uses: softprops/action-gh-release@v2
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ github.event.head_commit.message }}
          draft: false
          prerelease: true
          files: mirror-clone.tar.gz
